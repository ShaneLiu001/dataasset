    <rect x="1090" y="782" width="75" height="36" rx="4" fill="#fff" stroke="#d8dde5"/><text x="1127" y="801" text-anchor="middle" dominant-baseline="middle">取消</text>
    <rect x="1175" y="782" width="100" height="36" rx="4" fill="#356fca"/><text x="1225" y="801" text-anchor="middle" dominant-baseline="middle" class="white">开始生成</text>
  </g>

