      <text x="480" y="264" class="label">schema：</text><text x="500" y="264" class="value">zzh_tidb</text>
      <text x="1090" y="264" class="label">表名：</text><text x="1110" y="264" class="value">tidb02_lv_minus1_xysb</text>
      <text x="480" y="308" class="label"><tspan fill="#ef4f4f">*</tspan> 表中文名：</text>
      <rect x="500" y="289" width="420" height="38" fill="#ffffff" stroke="#d8dde5"/><text x="514" y="308" class="value muted">请输入</text>
      <text x="1090" y="308" class="label"><tspan fill="#ef4f4f">*</tspan> 目录挂载：</text>
      <rect x="1110" y="289" width="420" height="38" fill="#ffffff" stroke="#d8dde5"/><text x="1124" y="308" class="value muted">请选择</text>
