    <text x="360" y="743" class="cell">province</text><text x="590" y="743" class="cell">varchar(100)</text><text x="810" y="743" class="cell">省份　<tspan class="blue">AI·中</tspan></text><text x="1110" y="743" class="cell">省级行政区标识，需结合样例确认。</text><text x="1470" y="743" class="cell amber">需确认</text>
    <text x="360" y="793" class="cell">cityid</text><text x="590" y="793" class="cell">int(11)</text><text x="810" y="793" class="cell">城市编码　<tspan class="blue">AI·中</tspan></text><text x="1110" y="793" class="cell">建议结合关联表确认编码体系。</text><text x="1470" y="793" class="cell amber">需确认</text>
    <text x="360" y="843" class="cell">cityname</text><text x="590" y="843" class="cell">varchar(100)</text><text x="810" y="843" class="cell">城市名称　<tspan class="green">AI·高</tspan></text><text x="1110" y="843" class="cell">与 cityid 字段配套使用。</text><text x="1470" y="843" class="cell">已生成</text>
    <rect x="1430" y="0" width="490" height="1080" fill="#fff" stroke="#d8dde5"/>
    <text x="1460" y="58" class="title">AI 生成依据</text><text x="1880" y="58" text-anchor="end" class="title">×</text>
    <text x="1460" y="125" class="section">字段</text><text x="1460" y="160" class="value">cityid</text><line x1="1460" y1="190" x2="1880" y2="190" stroke="#e3e7ed"/>
    <text x="1460" y="235" class="section">推荐结果</text><text x="1460" y="275" class="value">城市编码</text><text x="1560" y="275" class="amber">中置信度 76%</text><line x1="1460" y1="305" x2="1880" y2="305" stroke="#e3e7ed"/>
    <text x="1460" y="350" class="section">生成依据</text><text x="1460" y="390" class="value">• 字段名可拆分为 city + id</text><text x="1460" y="430" class="value">• 字段类型为整数，符合编码类字段特征</text><text x="1460" y="470" class="value">• 同表存在 cityname，可形成编码与名称组合</text>
    <line x1="1460" y1="510" x2="1880" y2="510" stroke="#e3e7ed"/><text x="1460" y="555" class="section">人工确认建议</text><text x="1460" y="595" class="value">建议结合样例值或关联表确认编码体系。</text>
