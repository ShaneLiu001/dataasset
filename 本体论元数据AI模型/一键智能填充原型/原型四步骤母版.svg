      <text x="360" y="652" class="head">字段名称</text><text x="590" y="652" class="head">字段类型</text><text x="810" y="652" class="head">字段中文名称</text><text x="1110" y="652" class="head">备注</text><text x="1470" y="652" class="head">状态</text>

