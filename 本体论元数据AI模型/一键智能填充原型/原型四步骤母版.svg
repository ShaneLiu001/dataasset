    <text x="360" y="732" class="head">字段名称</text><text x="590" y="732" class="head">字段类型</text><text x="810" y="732" class="head">字段中文名称</text><text x="1110" y="732" class="head">备注</text><text x="1470" y="732" class="head">状态</text>
    <line x1="340" y1="754" x2="1580" y2="754" stroke="#e3e7ed"/><line x1="340" y1="812" x2="1580" y2="812" stroke="#e3e7ed"/><line x1="340" y1="870" x2="1580" y2="870" stroke="#e3e7ed"/>
    <text x="360" y="783" class="cell">province</text><text x="590" y="783" class="cell">varchar(100)</text><text x="810" y="783" class="cell muted">请输入</text><text x="1110" y="783" class="cell muted">请输入</text><text x="1470" y="783" class="cell">-</text>
    <text x="360" y="841" class="cell">cityid</text><text x="590" y="841" class="cell">int(11)</text><text x="810" y="841" class="cell muted">请输入</text><text x="1110" y="841" class="cell muted">请输入</text><text x="1470" y="841" class="cell">-</text>
  </g>

