    <line x1="1640" y1="600" x2="1570" y2="590" stroke="#d99525" stroke-width="2"/>
  </g>

  <!-- 步骤 2：配置 -->
  <g transform="translate(1920 0)">
    <use href="#blank-page"/>
    <rect x="270" y="35" width="1380" height="1010" fill="#202733" opacity="0.22"/>
    <rect x="610" y="230" width="700" height="600" fill="#fff" stroke="#d8dde5"/>
