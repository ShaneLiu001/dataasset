    <rect x="650" y="592" width="620" height="68" fill="#fff" stroke="#e3e7ed"/>
    <text x="675" y="618">○ 覆盖 AI 生成内容</text><text x="695" y="642" class="muted small">只更新未被人工修改的历史 AI 候选值</text>
    <rect x="650" y="674" width="620" height="68" fill="#fff" stroke="#e3e7ed"/>
    <text x="675" y="700">○ 覆盖全部内容</text><text x="695" y="724" class="muted small">提交前需要再次确认覆盖范围</text>
